# ipsc2hbp.peer.toml.sample - IPSC PEER mode example
#
# Copy to ipsc2hbp.toml and edit.  This mode keeps the HBP translator, but
# the IPSC side registers as a peer/client to an upstream MOTOTRBO IPSC master.

[global]
log_level = "ERROR"

[compat]
# PACKET_TRANSLATOR keeps the newer full-packet translator.
# LEGACY_AMBE behaves like the old IPSC_Bridge/HB_Bridge path: one active
# stream per timeslot, ignore duplicate headers, drop stale/foreign streams,
# rebuild clean outbound packets from AMBE + minimal metadata.
packet_flow = "LEGACY_AMBE"

[ipsc]
# IPSC role: PEER joins an upstream IPSC master instead of accepting a local
# repeater registration as a master.
mode = "PEER"

# Local UDP socket used for IPSC peer/client traffic.
bind_ip   = "10.255.0.254"
bind_port = 55019

# Radio ID this translator presents to the upstream IPSC master as an IPSC peer.
# Use a unique ID assigned for this bridge.
ipsc_peer_id = 19

# Unused in PEER mode.  Kept here so one config can be switched back to MASTER
# mode without adding the key later.
ipsc_master_id = 19

# Optional in PEER mode.  Ignored unless mode is MASTER.
allowed_peer_ip = ""

# IPSC HMAC-SHA1 authentication.  Must match the upstream IPSC master's key.
# This is the same IPSC auth process used in MASTER mode.
auth_enabled = true

# Auth key: up to 40 hex characters (20 bytes).  Shorter keys are left-zero-
# padded to 40 hex chars automatically.  Do not put a cleartext password here.
auth_key = "1A2B3C"

# PEER-mode keepalive interval and failure count.  The client re-registers to
# the upstream master after max_missed unanswered master keepalives.
keepalive_interval = 5
max_missed = 3

# Legacy MASTER-mode watchdog, unused in PEER mode but kept for easy rollback.
keepalive_watchdog = 60

# Original IPSC_Bridge-style slot arbitration. Inbound IPSC traffic marks the
# timeslot busy; HBP->IPSC packets are dropped while that slot is busy.
# This allows fast reverse-direction calls instead of suppressing by src/tg.
busy_slot_guard = true
busy_holdoff_ms = 100

# Direction lock: while one side owns a timeslot/talkgroup, ignore inverse-
# direction packets on that same talkgroup until the current call ends.
# This prevents reflected or colliding traffic from stealing the slot.
call_lock = false
call_lock_hang_ms = 100
call_lock_same_tg_only = true

# Optional loop guard for masters that echo this peer's own HBP-originated
# IPSC traffic back to it. Disabled by default because it can suppress a valid
# reverse-direction call using the same radio ID and talkgroup.
reflect_suppression = false
reflect_window = 8

[ipsc_upstream]
# Upstream MOTOTRBO repeater or c-Bridge acting as IPSC master.
master_ip   = "10.100.10.11"
master_port = 55002

[hbp]
# Upstream HBP master to connect to (BrandMeister, DMR+, FreeDMR, HBlink4).
master_ip   = "127.0.0.1"
master_port = 62019

# HBP repeater ID sent in all HBP packets.  If omitted or set to 0, ipsc_peer_id
# is used, which is normally what you want in PEER mode.
hbp_repeater_id = 31000119

# Passphrase for the HBP master.
passphrase = "NC4ES"

# TRACKING: connect HBP only after the IPSC upstream master accepts registration.
# PERSISTENT: keep HBP up regardless of IPSC upstream registration state.
hbp_mode = "PERSISTENT"

# HBP->IPSC transmit behavior. These mirror the older IPSC_Bridge behavior:
# wait for real voice before keying IPSC, send repeated headers, and pace
# packets at RF-like cadence so buffered HBP frames are not dumped in a burst.
hbp_start_on_voice = false
hbp_to_ipsc_header_repeats = 3
hbp_to_ipsc_pacing = true
hbp_to_ipsc_frame_interval_ms = 60
hbp_to_ipsc_queue_limit = 64

# Optional RPTO subscription string for HBlink4-compatible servers.
options = ""

# RPTC announcement fields sent to the HBP master during handshake.
callsign    = "NC4ES"
rx_freq     = "444000000"
tx_freq     = "449000000"
tx_power    = "25"
colorcode   = "1"
latitude    = "38.8500"
longitude   = "-097.6114"
height      = "10"
location    = "Arapahoe, NC"
description = "Arapahoe, NC"
url         = ""
software_id = "ipsc2hbp"
package_id  = "duplex"
